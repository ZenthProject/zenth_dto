// Encrypted local storage structures
syntax = "proto3";

package zenth;

import "session.proto";
import "group.proto";
import "keys.proto";
import "message.proto";

// User profile with identity keys and ZKP parameters
message LocalProfile {
  bytes user_hash_id = 1;
  bytes username_hash = 2;
  IdentityKey identity_key_pair_public = 3;
  bytes identity_key_pair_private = 4;
  uint32 registration_id = 5;
  PreKeyStore pre_key_store = 6;
  bytes zkp_parameters = 7;
  bytes password_commitment = 8;
  uint64 created_timestamp = 9;
  uint64 last_updated_timestamp = 10;
}

// Session database with fast lookup index
message SessionDatabase {
  repeated Session sessions = 1;
  uint32 next_session_id = 2;
  map<string, bytes> user_hash_to_session_id = 3;
  uint64 last_cleanup_timestamp = 4;
}

// Contact with trust verification and statistics
message Contact {
  bytes contact_hash_id = 1;
  bytes encrypted_display_name = 2;
  IdentityKey identity_key = 3;
  PreKeyBundle last_known_bundle = 4;
  uint64 added_timestamp = 5;
  uint64 last_message_timestamp = 6;

  enum TrustLevel {
    TRUST_UNKNOWN = 0;
    UNTRUSTED = 1;
    TRUSTED = 2;
    VERIFIED = 3;
  }

  TrustLevel trust_level = 7;
  bytes verification_signature = 8;
  uint64 message_count = 9;
  bool is_blocked = 10;
}

// Local address book with contacts
message AddressBook {
  repeated Contact contacts = 1;
  bytes owner_hash_id = 2;
  uint64 last_sync_timestamp = 3;
}

// Locally stored message with delivery status
message StoredMessage {
  bytes message_id = 1;
  bytes conversation_hash_id = 2;

  enum ConversationType {
    TYPE_UNKNOWN = 0;
    DIRECT = 1;
    GROUP = 2;
  }

  ConversationType conversation_type = 3;

  oneof message {
    ZenthSignalEnvelope direct_message = 4;
    GroupMessage group_message = 5;
  }

  enum MessageStatus {
    STATUS_UNKNOWN = 0;
    SENDING = 1;
    SENT = 2;
    DELIVERED = 3;
    READ = 4;
    FAILED = 5;
  }

  MessageStatus status = 6;
  bool is_outgoing = 7;
  uint64 created_timestamp = 8;
  uint64 sent_timestamp = 9;
  uint64 delivered_timestamp = 10;
  uint64 read_timestamp = 11;
  bool is_edited = 12;
  bool is_deleted = 13;
  bytes reply_to_message_id = 14;
}

// Conversation thread with metadata
message Conversation {
  bytes conversation_hash_id = 1;
  StoredMessage.ConversationType type = 2;
  bytes encrypted_title = 3;
  bytes avatar_hash = 4;
  bytes last_message_id = 5;
  uint64 last_message_timestamp = 6;
  uint64 message_count = 7;
  uint32 unread_count = 8;
  bool is_archived = 9;
  bool is_muted = 10;
  bool is_pinned = 11;
  uint64 created_timestamp = 12;
}

// Message database with indexing
message MessageDatabase {
  repeated StoredMessage messages = 1;
  repeated Conversation conversations = 2;
  map<string, bytes> message_id_index = 3;
  map<string, bytes> conversation_id_index = 4;
  uint64 last_cleanup_timestamp = 5;
  uint64 total_message_count = 6;
}

// Master key derived from user password
message MasterKey {
  bytes key_material = 1;
  bytes salt = 2;
  uint32 iterations = 3;

  enum KDFType {
    KDF_UNKNOWN = 0;
    ARGON2ID = 1;
    SCRYPT = 2;
    PBKDF2_SHA512 = 3;
  }

  KDFType kdf_type = 4;
  uint64 created_timestamp = 5;
}

// Complete local database structure
message ZenthDatabase {
  uint32 version = 1;
  LocalProfile profile = 2;
  bytes encrypted_master_key = 3;
  SessionDatabase session_db = 4;
  AddressBook address_book = 5;
  MessageDatabase message_db = 6;
  GroupStore group_store = 7;
  uint64 created_timestamp = 8;
  uint64 last_backup_timestamp = 9;
  bytes database_hash = 10;
}

// Encrypted database backup with signature
message EncryptedBackup {
  uint32 version = 1;
  bytes user_hash_id = 2;
  bytes encrypted_database = 3;
  bytes backup_key_salt = 4;
  uint64 backup_timestamp = 5;
  bytes backup_hash = 6;
  bytes dilithium_signature = 7;
}

// User preferences and security settings
message LocalSettings {
  bytes user_hash_id = 1;
  bool require_zkp_on_each_login = 2;
  uint32 session_timeout_minutes = 3;
  bool auto_lock_enabled = 4;
  bool enable_peer_discovery = 5;
  uint32 max_peer_connections = 6;
  repeated string bootstrap_nodes = 7;
  bool always_use_pq_keys = 8;
  bool auto_rotate_keys = 9;
  uint32 key_rotation_days = 10;
  bool auto_download_media = 11;
  bool show_read_receipts = 12;
  bool show_typing_indicators = 13;
  uint64 last_updated_timestamp = 14;
}
